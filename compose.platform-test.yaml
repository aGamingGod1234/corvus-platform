services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: corvus_platform_test
      POSTGRES_PASSWORD: corvus
      POSTGRES_USER: corvus
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U corvus -d corvus_platform_test"]
      interval: 2s
      timeout: 5s
      retries: 15
    ports:
      - "127.0.0.1:55432:5432"
    tmpfs:
      - /var/lib/postgresql/data
