name: desktop-release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  package:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows unsigned NSIS
            os: windows-latest
            sidecar-triple: x86_64-pc-windows-msvc
            bundles: nsis
            artifact-name: corvus-windows-x64-beta
            artifact-path: apps/desktop/src-tauri/target/release/bundle/nsis/*.exe
          - name: macOS unsigned x64 DMG
            os: macos-15-intel
            sidecar-triple: x86_64-apple-darwin
            rust-target: x86_64-apple-darwin
            bundles: dmg
            artifact-name: corvus-macos-x64-beta
            artifact-path: apps/desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - name: Linux unsigned AppImage and deb
            os: ubuntu-22.04
            sidecar-triple: x86_64-unknown-linux-gnu
            bundles: appimage,deb
            artifact-name: corvus-linux-x64-beta
            artifact-path: |
              apps/desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              apps/desktop/src-tauri/target/release/bundle/deb/*.deb

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: Set up Node
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: "22"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@d0d8abe699bfb85fec6de9f7adb5ae17292296ff
        with:
          enable-cache: true

      - name: Install Rust macOS target
        if: runner.os == 'macOS'
        run: rustup target add ${{ matrix.rust-target }}

      - name: Install dependencies
        run: |
          npm install --global pnpm@11.13.0
          uv sync --all-groups --locked --python 3.12
          pnpm --dir apps/web install --frozen-lockfile
          pnpm --dir apps/desktop install --frozen-lockfile

      - name: Build packaged sidecar
        shell: pwsh
        run: |
          $pyinstallerArgs = @("--clean", "--noconfirm", "--onefile", "--name", "corvus-mvp", "scripts/corvus_mvp_entry.py")
          uv run --python 3.12 --with pyinstaller==6.21.0 pyinstaller @pyinstallerArgs
          $extension = if ($IsWindows) { ".exe" } else { "" }
          $source = "dist/corvus-mvp$extension"
          $targetDir = "apps/desktop/src-tauri/binaries"
          New-Item -ItemType Directory -Force -Path $targetDir | Out-Null
          Copy-Item -LiteralPath $source -Destination "$targetDir/corvus-mvp-${{ matrix.sidecar-triple }}$extension"
          Copy-Item -LiteralPath $source -Destination "$targetDir/corvus-mvp"
          Copy-Item -LiteralPath $source -Destination "$targetDir/corvus-mvp.exe"
          & "$targetDir/corvus-mvp-${{ matrix.sidecar-triple }}$extension" --help

      - name: Build desktop installer
        shell: pwsh
        run: |
          $targetArgs = @()
          if ("${{ matrix.rust-target }}" -ne "") {
            $targetArgs = @("--target", "${{ matrix.rust-target }}")
          }
          pnpm --dir apps/desktop tauri build @targetArgs --bundles "${{ matrix.bundles }}" --config src-tauri/tauri.release.conf.json

      - name: Upload installer artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: ${{ matrix.artifact-name }}
          path: ${{ matrix.artifact-path }}
          if-no-files-found: error

  github-release:
    name: GitHub prerelease
    if: startsWith(github.ref, 'refs/tags/v')
    needs: package
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0

      - name: Verify tag commit is on main
        run: |
          git fetch --no-tags origin main
          git merge-base --is-ancestor "$GITHUB_SHA" "origin/main"

      - name: Download installers
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093
        with:
          path: release-assets

      - name: Validate tag and generate checksums
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="$(node -p "require('./apps/desktop/package.json').version")"
          test "$TAG" = "v$VERSION"
          while IFS= read -r -d '' artifact; do
            digest="$(sha256sum "$artifact" | cut -d ' ' -f 1)"
            printf '%s  %s\n' "$digest" "$(basename "$artifact")"
          done < <(find release-assets -maxdepth 2 -type f -print0 | sort -z) > SHA256SUMS.txt

      - name: Publish prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          title="Corvus $GITHUB_REF_NAME unsigned beta"
          notes="Unsigned beta installers for Windows x64, macOS x64, and Linux x64. These artifacts bundle the Corvus local sidecar for beta evaluation and are not notarized or code signed. Verify downloads with SHA256SUMS.txt."
          if [[ "$GITHUB_REF_NAME" == *"build-week"* ]]; then
            title="Corvus Build Week 2026 Hackathon Submission"
            notes="Official Build Week 2026 submission snapshot. Unsigned Windows x64, macOS x64, and Linux x64 installers are built from this immutable tag and bundle the Corvus local sidecar. Verify every download with SHA256SUMS.txt."
          fi
          gh release create "$GITHUB_REF_NAME" $(find release-assets -maxdepth 2 -type f) SHA256SUMS.txt --prerelease --title "$title" --notes "$notes"
